<div class="p-6 max-w-3xl">

  <div class="mb-5 pb-4 border-b border-celadon">
    <h2 class="text-xl font-semibold text-midnight-violet mb-2">Note #{{ note.id }}</h2>
    <div class="flex items-center gap-1.5 text-sm text-midnight-violet opacity-50">
      🗓️
      <span>{{ note.created_at.strftime('%Y-%m-%d %H:%M') }}</span>
    </div>
  </div>

  <div class="flex gap-2 mb-5">
    <button class="text-xs px-2.5 py-1 rounded border {% if mode == 'rendered' %}bg-midnight-violet text-white border-midnight-violet{% else %}border-celadon text-midnight-violet hover:border-midnight-violet{% endif %} transition-colors"
            hx-get="/notes/{{ note.id }}?mode=rendered"
            hx-target="#main-panel"
            hx-swap="innerHTML">
      Rendered
    </button>
    <button class="text-xs px-2.5 py-1 rounded border {% if mode == 'raw' %}bg-midnight-violet text-white border-midnight-violet{% else %}border-celadon text-midnight-violet hover:border-midnight-violet{% endif %} transition-colors"
            hx-get="/notes/{{ note.id }}?mode=raw"
            hx-target="#main-panel"
            hx-swap="innerHTML">
      Raw
    </button>
  </div>

  {% if mode == "raw" %}
  <pre class="font-mono text-sm text-midnight-violet whitespace-pre-wrap break-words leading-relaxed">{{ note.content }}</pre>
  {% else %}
  <div class="prose text-sm text-midnight-violet leading-relaxed">
    {{ rendered_html | safe }}
  </div>
  {% endif %}

</div>
